services:
  sqlserver:
    command:
      - "/opt/mssql/bin/sqlservr"
    container_name: "sqlserver"
    entrypoint:
      - "/opt/mssql/bin/launch_sqlservr.sh"
    environment:
      - "ACCEPT_EULA=Y"
      - "MSSQL_SA_PASSWORD=UberWorkshop@2024"
      - "PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      - "MSSQL_RPC_PORT=135"
      - "CONFIG_EDGE_BUILD="
      - "MSSQL_PID=developer"
    hostname: "226ececd1c69"
    image: "mcr.microsoft.com/mssql/server:2022-latest"
    ipc: "private"
    labels:
      com.microsoft.product: "Microsoft SQL Server"
      com.microsoft.version: "16.0.4245.2"
      org.opencontainers.image.ref.name: "ubuntu"
      org.opencontainers.image.version: "22.04"
      vendor: "Microsoft"
    logging:
      driver: "json-file"
      options: {}
    network_mode: "bridge"
    ports:
      - "1433:1433/tcp"
    user: "mssql"
version: "3.6"
